# ------------------------------------------------------------------------------
# Ruff Configuration
# ------------------------------------------------------------------------------

[tool.ruff]
line-length = 100
target-version = "py312"

exclude = [
    ".git",
    ".venv",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # bugbear
]

ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

# ------------------------------------------------------------------------------
# Pytest Configuration
# ------------------------------------------------------------------------------

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra -q"

# ------------------------------------------------------------------------------
# Coverage
# ------------------------------------------------------------------------------

[tool.coverage.run]
source = ["src/customer_churn_mlops"]

[tool.coverage.report]
show_missing = true
skip_covered = true
